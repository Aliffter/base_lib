# 包名，业务项目会通过这个名字引用。
name: kiwin_lib
# 包说明
description: "qiyun lib test"
# 版本号
version: 1.0.2
# 项目主页
homepage: https://github.com/your-org/kiwin_lib

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  intl: 0.20.2
  flutter_auto_size_text: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

